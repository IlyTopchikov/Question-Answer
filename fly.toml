# Уникальное имя приложения: если "demo4" занято — поменяй и снова: fly deploy
app = "demo4"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpus = 1
