spring.application.name=demo4
server.port=${PORT:8080}

# Подключение к БД через переменные Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Настройки Hibernate для автоматического создания таблиц
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Чтобы приложение не "отваливалось" при запуске
spring.datasource.hikari.connection-timeout=45000
spring.datasource.hikari.maximum-pool-size=5
