spring.application.name=demo4
server.port=${PORT:8080}

# Пытаемся взять DATABASE_URL. Если её нет, берем SPRING_DATASOURCE_URL. 
# Если и её нет — используем пустую строку (это вызовет ошибку драйвера)
spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Чтобы Render не ругался на порты
spring.main.banner-mode=off
