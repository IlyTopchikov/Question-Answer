<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head ('Админ-панель')}"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<div class="container py-4 col-lg-7">
    <h1 class="h4 mb-4">⚙️ Админ-панель</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card card-soft mb-4">
        <div class="card-body p-4">
            <h2 class="h5 mb-3">Управление баллами</h2>

            <!-- Установить баллы вручную -->
            <form th:action="@{/admin/points/set}" method="post" class="row g-2 mb-3">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <div class="col-sm-5">
                    <input class="form-control" name="username" placeholder="Username" type="text" required/>
                </div>
                <div class="col-sm-3">
                    <input class="form-control" name="points" placeholder="Баллы" type="number" min="0" required/>
                </div>
                <div class="col-sm-4">
                    <button class="btn btn-primary w-100" type="submit">Установить баллы</button>
                </div>
            </form>

            <!-- Сбросить баллы -->
            <form th:action="@{/admin/points/reset}" method="post" class="row g-2">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <div class="col-sm-5">
                    <input class="form-control" name="username" placeholder="Username" type="text" required/>
                </div>
                <div class="col-sm-4">
                    <button class="btn btn-outline-danger" type="submit">Сбросить в 0</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Таблица пользователей -->
    <div class="card card-soft">
        <div class="card-body p-4">
            <h2 class="h5 mb-3">Текущие баллы</h2>
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Пользователь</th>
                        <th class="text-end">Баллы</th>
                        <th class="text-end">Действие</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row, iter : ${leaderboard}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${row.name}">Имя</td>
                        <td class="text-end">
                            <span class="badge badge-points" th:text="${row.points}">0</span>
                        </td>
                        <td class="text-end">
                            <form th:action="@{/admin/points/reset}" method="post" class="d-inline">
                                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                                <input name="username" th:value="${row.name}" type="hidden"/>
                                <button class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Сбросить баллы?')" type="submit">0</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(leaderboard)}">
                        <td colspan="4" class="text-muted">Нет данных</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <a class="btn btn-link mt-3" th:href="@{/}">← На главную</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
