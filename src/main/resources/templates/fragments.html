<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:fragment="head (title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">QA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background: linear-gradient(160deg, #f6f8fc 0%, #eef2f9 100%); min-height: 100vh; }
        .card-soft { border: none; border-radius: 1rem; box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08); }
        .brand { font-weight: 700; letter-spacing: -0.02em; color: #1e293b; }
        .badge-points { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    </style>
</head>
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg bg-white border-bottom mb-4 shadow-sm">
    <div class="container py-2">
        <a class="navbar-brand brand" th:href="@{/index.html}">Вопросник</a>
        <div class="navbar-nav ms-auto d-flex align-items-center gap-2 flex-wrap">
            <a class="nav-link" th:href="@{/leaderboard}">Таблица баллов</a>
            <a sec:authorize="isAuthenticated()" class="nav-link position-relative" th:href="@{/messages}">
                💬 Сообщения
            </a>
            <span sec:authorize="isAuthenticated()" class="text-muted small">
                <span sec:authentication="name"></span>
            </span>
            <a sec:authorize="isAuthenticated()" class="btn btn-sm btn-outline-secondary"
               th:href="@{/logout}"
               onclick="event.preventDefault(); document.getElementById('logout-form').submit();">Выйти</a>
            <form id="logout-form" th:action="@{/logout}" method="post" style="display:none;">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
            </form>
            <a sec:authorize="!isAuthenticated()" class="btn btn-sm btn-outline-primary" th:href="@{/login}">Войти</a>
            <a sec:authorize="!isAuthenticated()" class="btn btn-sm btn-primary" th:href="@{/register}">Регистрация</a>
        </div>
    </div>
</nav>
</body>
</html>
