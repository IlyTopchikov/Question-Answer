<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head ('Таблица баллов')}"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<div class="container pb-5 col-lg-6">
    <div class="card card-soft">
        <div class="card-body p-4">
            <h1 class="h4 mb-3">Таблица баллов</h1>
            <p class="text-muted small">Рейтинг по сумме баллов за ответы.</p>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Имя</th>
                        <th scope="col" class="text-end">Баллы</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row, iter : ${leaderboard}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${row.name}">Имя</td>
                        <td class="text-end">
                            <span class="badge badge-points" th:text="${row.points}">0</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(leaderboard)}">
                        <td colspan="3" class="text-muted">Пока нет данных.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <a class="btn btn-outline-secondary" th:href="@{/index.html}">На главную</a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
