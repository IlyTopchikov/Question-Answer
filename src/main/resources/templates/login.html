<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head ('Вход')}"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<div class="container py-5 col-lg-4">
    <div class="card card-soft">
        <div class="card-body p-4">
            <h1 class="h4 mb-4">Вход</h1>
            <div th:if="${param.registered}" class="alert alert-success">Регистрация успешна! Войдите.</div>
            <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль.</div>
            <form method="post" th:action="@{/login}">
                <div class="mb-3">
                    <label class="form-label">Имя пользователя</label>
                    <input class="form-control" name="username" type="text" autofocus/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input class="form-control" name="password" type="password"/>
                </div>
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <button class="btn btn-primary w-100" type="submit">Войти</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/register}">Нет аккаунта? Зарегистрироваться</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
