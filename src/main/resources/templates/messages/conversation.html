<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{fragments :: head ('Диалог')}"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<div class="container py-4">
    <div class="row g-4">
        <!-- Контакты -->
        <div class="col-lg-4">
            <div class="card card-soft">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">💬 Сообщения</h2>
                    <!-- Новое сообщение -->
                    <form th:action="@{/messages/send}" method="post" class="mb-4">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <div class="mb-2">
                            <input class="form-control form-control-sm" name="to" type="text"
                                   placeholder="Username получателя"/>
                        </div>
                        <div class="mb-2">
                            <textarea class="form-control form-control-sm" name="body" rows="2"
                                      placeholder="Сообщение..."></textarea>
                        </div>
                        <button class="btn btn-primary btn-sm w-100" type="submit">Отправить</button>
                    </form>
                    <div class="list-group list-group-flush">
                        <a class="list-group-item list-group-item-action rounded mb-1"
                           th:each="contact : ${contacts}"
                           th:classappend="${contact.username == otherUsername} ? 'active' : ''"
                           th:href="@{/messages/{u}(u=${contact.username})}">
                            <span th:text="${contact.username}">Имя</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Переписка -->
        <div class="col-lg-8">
            <div class="card card-soft">
                <div class="card-body p-4">
                    <h3 class="h6 mb-3">Диалог с <strong th:text="${otherUsername}"></strong></h3>
                    <!-- Сообщения -->
                    <div style="max-height: 400px; overflow-y: auto;" class="mb-3" id="chat">
                        <div th:if="${#lists.isEmpty(messages)}" class="text-muted small">Нет сообщений</div>
                        <div th:each="msg : ${messages}" class="mb-2">
                            <div th:classappend="${msg.sender.username == #authentication.name} ? 'd-flex justify-content-end' : 'd-flex justify-content-start'">
                                <div class="p-2 rounded-3 small"
                                     th:classappend="${msg.sender.username == #authentication.name} ? 'bg-primary text-white' : 'bg-light'"
                                     style="max-width: 70%;">
                                    <div th:text="${msg.body}"></div>
                                    <div class="opacity-75 mt-1" style="font-size: 0.7rem;"
                                         th:text="${#dates.format(new java.util.Date(msg.createdAt.toEpochMilli()), 'HH:mm')}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Форма отправки -->
                    <form th:action="@{/messages/send}" method="post" class="d-flex gap-2">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <input name="to" th:value="${otherUsername}" type="hidden"/>
                        <input class="form-control" name="body" placeholder="Сообщение..." type="text"/>
                        <button class="btn btn-primary" type="submit">→</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    // Прокрутить вниз
    const chat = document.getElementById('chat');
    if (chat) chat.scrollTop = chat.scrollHeight;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
