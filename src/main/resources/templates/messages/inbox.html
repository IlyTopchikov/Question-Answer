<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head ('Сообщения')}"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<div class="container py-4">
    <div class="row g-4">
        <!-- Контакты -->
        <div class="col-lg-4">
            <div class="card card-soft">
                <div class="card-body p-4">
                    <h2 class="h5 mb-3">💬 Сообщения</h2>
                    <div th:if="${error}" class="alert alert-danger small" th:text="${error}"></div>

                    <!-- Новое сообщение -->
                    <form th:action="@{/messages/send}" method="post" class="mb-4">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <div class="mb-2">
                            <input class="form-control form-control-sm" name="to" type="text"
                                   placeholder="Username получателя" th:value="${form.to}"/>
                        </div>
                        <div class="mb-2">
                            <textarea class="form-control form-control-sm" name="body" rows="2"
                                      placeholder="Сообщение..."></textarea>
                        </div>
                        <button class="btn btn-primary btn-sm w-100" type="submit">Отправить</button>
                    </form>

                    <!-- Список диалогов -->
                    <div th:if="${#lists.isEmpty(contacts)}" class="text-muted small">Нет диалогов</div>
                    <div class="list-group list-group-flush" th:unless="${#lists.isEmpty(contacts)}">
                        <a class="list-group-item list-group-item-action rounded mb-1"
                           th:each="contact : ${contacts}"
                           th:href="@{/messages/{u}(u=${contact.username})}">
                            <span th:text="${contact.username}">Имя</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Пустое состояние -->
        <div class="col-lg-8">
            <div class="card card-soft h-100">
                <div class="card-body p-4 d-flex align-items-center justify-content-center text-muted">
                    Выберите диалог или напишите новое сообщение
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
