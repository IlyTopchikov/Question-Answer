<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{fragments :: head (${question.title})}"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<div class="container pb-5 col-lg-8">
    <div th:if="${param.answered != null}" class="alert alert-success alert-dismissible fade show">
        Ответ опубликован!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Вопрос -->
    <div class="card card-soft mb-4" th:classappend="${question.solved} ? 'border-success border-2' : ''">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start gap-2">
                <div>
                    <span th:if="${question.solved}" class="badge bg-success mb-2">✅ Решено</span>
                    <h1 class="h3 mb-2" th:text="${question.title}">Заголовок</h1>
                    <p class="text-muted small mb-3">
                        Спросил(а) <strong th:text="${question.askerName}">имя</strong>
                        · <span th:text="${#dates.format(new java.util.Date(question.createdAt.toEpochMilli()), 'dd.MM.yyyy HH:mm')}">дата</span>
                    </p>
                </div>
                <div class="d-flex gap-2 flex-wrap justify-content-end">
                    <!-- Решено/Не решено -->
                    <form th:if="${#authentication.name == question.askerName or #authorization.expression('hasRole(''ADMIN'')')}"
                          th:action="@{/questions/{id}/solve(id=${question.id})}" method="post">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <button class="btn btn-sm" th:classappend="${question.solved} ? 'btn-success' : 'btn-outline-success'" type="submit">
                            <span th:text="${question.solved} ? '✅ Решено' : '☐ Отметить решённым'"></span>
                        </button>
                    </form>
                    <!-- Редактировать -->
                    <a class="btn btn-sm btn-outline-secondary"
                       th:if="${#authentication.name == question.askerName or #authorization.expression('hasRole(''ADMIN'')')}"
                       th:href="@{/questions/{id}/edit(id=${question.id})}">✏️ Изменить</a>
                    <!-- Удалить -->
                    <form th:if="${#authentication.name == question.askerName or #authorization.expression('hasRole(''ADMIN'')')}"
                          th:action="@{/questions/{id}/delete(id=${question.id})}" method="post">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Удалить вопрос?')" type="submit">🗑️</button>
                    </form>
                </div>
            </div>
            <div style="white-space: pre-wrap;" th:text="${question.body}">Текст</div>
            <div class="mt-3" th:if="${question.imageData != null}">
                <img alt="Изображение" class="img-fluid rounded" style="max-height: 400px;"
                     th:src="@{/questions/{id}/image(id=${question.id})}"/>
            </div>
        </div>
    </div>

    <!-- Ответы -->
    <h2 class="h5 mb-3">Ответы (<span th:text="${#lists.size(question.answers)}">0</span>)</h2>
    <div th:if="${#lists.isEmpty(question.answers)}" class="text-muted mb-4">Пока нет ответов — будьте первым.</div>
    <div class="mb-4" th:unless="${#lists.isEmpty(question.answers)}">
        <div class="card card-soft mb-3" th:each="a : ${question.answers}">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                    <span class="fw-semibold" th:text="${a.answererName}">Имя</span>
                    <div class="d-flex align-items-center gap-2">
                        <span class="badge text-bg-light border small"
                              th:text="${#dates.format(new java.util.Date(a.createdAt.toEpochMilli()), 'dd.MM.yyyy HH:mm')}">дата</span>
                        <!-- Редактировать ответ -->
                        <button class="btn btn-sm btn-outline-secondary"
                                th:if="${#authentication.name == a.answererName or #authorization.expression('hasRole(''ADMIN'')')}"
                                th:onclick="'toggleEditAnswer(' + ${a.id} + ')'">✏️</button>
                        <!-- Удалить ответ -->
                        <form th:if="${#authentication.name == a.answererName or #authorization.expression('hasRole(''ADMIN'')')}"
                              th:action="@{/answers/{id}/delete(id=${a.id})}" method="post">
                            <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                            <input name="questionId" th:value="${question.id}" type="hidden"/>
                            <button class="btn btn-sm btn-outline-danger" onclick="return confirm('Удалить?')" type="submit">🗑️</button>
                        </form>
                    </div>
                </div>
                <!-- Текст ответа -->
                <div th:id="'answer-text-' + ${a.id}" style="white-space: pre-wrap;" th:text="${a.body}">Текст</div>
                <!-- Форма редактирования (скрыта) -->
                <form th:if="${#authentication.name == a.answererName or #authorization.expression('hasRole(''ADMIN'')')}"
                      th:id="'edit-form-' + ${a.id}"
                      th:action="@{/answers/{id}/edit(id=${a.id})}" method="post"
                      enctype="multipart/form-data" style="display:none;" class="mt-2">
                    <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                    <input name="questionId" th:value="${question.id}" type="hidden"/>
                    <textarea class="form-control mb-2" name="body" rows="3" th:text="${a.body}"></textarea>
                    <input class="form-control mb-2" name="image" type="file" accept="image/*"/>
                    <button class="btn btn-sm btn-primary" type="submit">Сохранить</button>
                    <button class="btn btn-sm btn-link" type="button" th:onclick="'toggleEditAnswer(' + ${a.id} + ')'">Отмена</button>
                </form>
                <div class="mt-2" th:if="${a.imageData != null}">
                    <img alt="Изображение" class="img-fluid rounded" style="max-height: 300px;"
                         th:src="@{/answers/{id}/image(id=${a.id})}"/>
                </div>
            </div>
        </div>
    </div>

    <!-- Форма ответа -->
    <div class="card card-soft" sec:authorize="isAuthenticated()">
        <div class="card-body p-4">
            <h3 class="h6 mb-3">Ваш ответ</h3>
            <form th:action="@{/questions/{id}/answers(id=${question.id})}" th:object="${newAnswer}"
                  method="post" enctype="multipart/form-data" novalidate>
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <div class="mb-3">
                    <textarea class="form-control" id="body" th:field="*{body}" rows="4" placeholder="Ваш ответ..."></textarea>
                    <div class="invalid-feedback d-block" th:errors="*{body}" th:if="${#fields.hasErrors('body')}"></div>
                </div>
                <div class="mb-3">
                    <input class="form-control" name="image" type="file" accept="image/*"/>
                </div>
                <button class="btn btn-primary" type="submit">Отправить ответ</button>
                <a class="btn btn-link" th:href="@{/index.html}">На главную</a>
            </form>
        </div>
    </div>
    <div class="alert alert-info mt-3" sec:authorize="!isAuthenticated()">
        <a th:href="@{/login}">Войдите</a>, чтобы ответить.
    </div>
</div>
<script>
function toggleEditAnswer(id) {
    const text = document.getElementById('answer-text-' + id);
    const form = document.getElementById('edit-form-' + id);
    if (form) {
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
        if (text) text.style.display = text.style.display === 'none' ? 'block' : 'none';
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
