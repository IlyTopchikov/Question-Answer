<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head ('Регистрация')}"></head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<div class="container py-5 col-lg-4">
    <div class="card card-soft">
        <div class="card-body p-4">
            <h1 class="h4 mb-4">Регистрация</h1>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form method="post" th:action="@{/register}" th:object="${form}" novalidate>
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <div class="mb-3">
                    <label class="form-label">Имя пользователя</label>
                    <input class="form-control" th:field="*{username}" type="text"/>
                    <div class="invalid-feedback d-block" th:errors="*{username}" th:if="${#fields.hasErrors('username')}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" th:field="*{email}" type="email"/>
                    <div class="invalid-feedback d-block" th:errors="*{email}" th:if="${#fields.hasErrors('email')}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input class="form-control" th:field="*{password}" type="password"/>
                    <div class="invalid-feedback d-block" th:errors="*{password}" th:if="${#fields.hasErrors('password')}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Подтвердите пароль</label>
                    <input class="form-control" th:field="*{confirmPassword}" type="password"/>
                    <div class="invalid-feedback d-block" th:errors="*{confirmPassword}" th:if="${#fields.hasErrors('confirmPassword')}"></div>
                </div>
                <button class="btn btn-primary w-100" type="submit">Зарегистрироваться</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/login}">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
